_schema-version: "3.2"
ID: accrual
description: "Banker Guarantee Production"
version: 3.0.0
modules:
- name: accrual-destination-content
  type: com.sap.application.content
  requires:
  - name: accrual-destination-service
    parameters:
      content-target: true
  - name: accrual-repo-host
    parameters:
      service-key:
        name: accrual-repo-host-key
  - name: accrual-uaa
    parameters:
      service-key:
        name: accrual-uaa-key
  parameters:
    content:
      instance:
        destinations:
        - Name: accrual_html_repo_host
          ServiceInstanceName: accrual-html5-srv
          ServiceKeyName: accrual-repo-host-key
          sap.cloud.service: accrual
        - Authentication: OAuth2UserTokenExchange
          Name: accrual_uaa
          ServiceInstanceName: accrual-xsuaa-srv
          ServiceKeyName: accrual-uaa-key
          sap.cloud.service: accrual
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: accrual-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: accrual-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - accrual.zip
      name: accrual
      target-path: resources/
- name: accrual
  type: html5
  path: .
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: accrual-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: accrual-destination-service1
    service-plan: lite
- name: accrual-uaa
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: accrual-xsuaa-srv
    service-plan: application
- name: accrual-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: accrual-html5-srv
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true